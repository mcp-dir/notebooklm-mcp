# Smithery configuration for NotebookLM
# Schema: https://smithery.ai/docs/build/project-config
# Remote HTTP MCP — server hosted at https://api.mcp.ai/p_notebooklm

name: notebooklm-mcp
displayName: "NotebookLM"
description: >
  Google NotebookLM em linguagem natural: crie notebooks, adicione fontes (PDF, URL, YouTube) e faça perguntas com respostas fundamentadas + citações. NotebookLM não tem API oficial, conecte com 1 clique pela extensão do mcp.ai (captura os cookies da sua sessão Google; ficam criptografados na plataforma).

version: 0.1.0
license: MIT
homepage: https://github.com/mcp-dir/notebooklm-mcp
repository: https://github.com/mcp-dir/notebooklm-mcp

tags:
  - notebooklm
  - brazil
  - horizontal
  - read-only

# Remote HTTP MCP — sem startCommand local (servidor já hospedado)
startCommand:
  type: http
  url: https://api.mcp.ai/p_notebooklm

auth:
  type: oauth2
  resourceMetadataUrl: https://api.mcp.ai/p_notebooklm/.well-known/oauth-protected-resource
  fallback:
    type: agent-auth
    description: >
      Para clientes sem OAuth 2.1. O agente expõe uma tool authenticate(token).
      Usuário gera o JWT em https://app.mcp.ai/agent-auth e cola no chat.
